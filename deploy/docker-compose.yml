services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: control_it_hub
      POSTGRES_USER: control_it_hub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U control_it_hub -d control_it_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_URL: ${APP_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      DATABASE_URL: postgresql://control_it_hub:${POSTGRES_PASSWORD}@postgres:5432/control_it_hub?schema=public
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_COMPANY_NAME: ${SEED_COMPANY_NAME}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
